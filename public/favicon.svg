<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    :root { color-scheme: light dark; }
    .icon { fill: #0a0a0a; }
    @media (prefers-color-scheme: dark) {
      .icon { fill: #ffffff; }
    }
  </style>
  <!-- A shape: apex (100,29), legs to bottom corners, arch cutout via evenodd -->
  <path class="icon" fill-rule="evenodd" d="
    M 100 29
    L 174 171
    L 135 171
    L 65 171
    L 26 171
    Z
    M 74 171
    Q 100 76, 126 171
    Z
  "/>
</svg>
